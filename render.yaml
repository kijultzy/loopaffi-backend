services:
  # ------------------------------------------------------------------
  # BACKEND SERVICE (GO)
  # ------------------------------------------------------------------
  - type: web
    name: loopaffi-backend
    runtime: docker
    rootDir: loopaffi-backend
    region: singapore
    plan: free
    envVars:
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        fromDatabase:
          name: loopaffi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "*" # Nanti ganti dengan URL frontend setelah dideploy

databases:
  # ------------------------------------------------------------------
  # DATABASE SERVICE (POSTGRESQL)
  # ------------------------------------------------------------------
  - name: loopaffi-db
    databaseName: loopaffi_db
    user: loopaffi_admin
    region: singapore
    plan: free
